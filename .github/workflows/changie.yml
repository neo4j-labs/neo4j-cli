name: changie

on:
  push:
    branches: ["main"]

jobs:
  generate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute next pre-release versions
        id: prerelease
        run: |
          LAST_AURA=$(ls .changes/aura-cli/v*-alpha.[0-9]*.md 2>/dev/null \
            | grep -oE 'alpha\.[0-9]+\.md' | grep -oE '[0-9]+' | sort -n | tail -1)
          if [ -z "$LAST_AURA" ]; then
            echo "aura=alpha.0" >> $GITHUB_OUTPUT
          else
            echo "aura=alpha.$((LAST_AURA + 1))" >> $GITHUB_OUTPUT
          fi
          LAST_NEO=$(ls .changes/neo4j-cli/v*-alpha.[0-9]*.md 2>/dev/null \
            | grep -oE 'alpha\.[0-9]+\.md' | grep -oE '[0-9]+' | sort -n | tail -1)
          if [ -z "$LAST_NEO" ]; then
            echo "neo4j=alpha.0" >> $GITHUB_OUTPUT
          else
            echo "neo4j=alpha.$((LAST_NEO + 1))" >> $GITHUB_OUTPUT
          fi
          find .changes/aura-cli -name 'v*-*.md' -delete 2>/dev/null || true
          find .changes/neo4j-cli -name 'v*-*.md' -delete 2>/dev/null || true

      - name: Detect unreleased changes per project
        id: detect
        run: |
          if grep -rl 'project: aura-cli' .changes/unreleased/ 2>/dev/null | grep -q .; then
            echo "has_aura=true" >> $GITHUB_OUTPUT
          else
            echo "has_aura=false" >> $GITHUB_OUTPUT
          fi
          if grep -rl 'project: neo4j-cli' .changes/unreleased/ 2>/dev/null | grep -q .; then
            echo "has_neo4j=true" >> $GITHUB_OUTPUT
          else
            echo "has_neo4j=false" >> $GITHUB_OUTPUT
          fi

      - name: Batch aura-cli changes
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: batch auto --project aura-cli --prerelease ${{ steps.prerelease.outputs.aura }}

      - name: Batch neo4j-cli changes
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: batch auto --project neo4j-cli --prerelease ${{ steps.prerelease.outputs.neo4j }}

      - name: Merge changelogs
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: merge

      - name: Get aura-cli latest version
        id: latest-aura
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: latest --project aura-cli

      - name: Get neo4j-cli latest version
        id: latest-neo4j
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: latest --project neo4j-cli

      - name: Extract version numbers
        id: versions
        run: |
          AURA_VERSION=$(echo "${{ steps.latest-aura.outputs.output }}" | sed 's/^aura-cli//')
          NEO4J_VERSION=$(echo "${{ steps.latest-neo4j.outputs.output }}" | sed 's/^neo4j-cli//')
          echo "aura=$AURA_VERSION" >> $GITHUB_OUTPUT
          echo "neo4j=$NEO4J_VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          title: "Release aura-cli ${{ steps.versions.outputs.aura }} / neo4j-cli ${{ steps.versions.outputs.neo4j }}"
          branch: "release/neo4j-cli-${{ steps.versions.outputs.neo4j }}"
          body: |
            ## Release aura-cli ${{ steps.versions.outputs.aura }} / neo4j-cli ${{ steps.versions.outputs.neo4j }}

            This release includes updates to both binaries.

            - **aura-cli** ${{ steps.versions.outputs.aura }} — see [CHANGELOG-aura.md](CHANGELOG-aura.md)
            - **neo4j-cli** ${{ steps.versions.outputs.neo4j }} — see [CHANGELOG-neo4j.md](CHANGELOG-neo4j.md)
          commit-message: "Release aura-cli ${{ steps.versions.outputs.aura }} / neo4j-cli ${{ steps.versions.outputs.neo4j }}"
          token: ${{ env.TOKEN }}
        env:
          TOKEN: ${{ secrets.TEAM_GRAPHQL_PERSONAL_ACCESS_TOKEN }}
