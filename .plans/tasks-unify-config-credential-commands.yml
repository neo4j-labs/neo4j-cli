feature: unify-config-credential-commands
prd: ./prd-unify-config-credential-commands.md
created_at: 2026-05-02T00:00:00Z
updated_at: 2026-05-02T00:00:00Z

tasks:
  - id: task-001
    title: "Add dot-notation config key resolution helper to common/clicfg"
    description: |
      Add a shared key resolution helper in common/clicfg (e.g. ResolveConfigKey) that
      accepts a dot-notation key string and returns which config namespace it belongs to
      (global or aura) and the bare key name. Keys prefixed with "aura." resolve to the
      aura namespace; all others resolve to global. Keys that exist in both namespaces
      (i.e. "output") must resolve as global only — "aura.output" must be rejected as
      invalid. The function should return an error for unrecognised keys.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "ResolveConfigKey(\"output\", ...) returns global namespace, key \"output\", no error"
      - "ResolveConfigKey(\"aura.default-tenant\", ...) returns aura namespace, key \"default-tenant\", no error"
      - "ResolveConfigKey(\"aura.output\", ...) returns an error (output is global-only)"
      - "ResolveConfigKey(\"aura.unknown\", ...) returns an error for unrecognised aura keys"
      - "ResolveConfigKey(\"unknown\", ...) returns an error for unrecognised global keys"
    completed_at: "2026-05-02T00:00:00Z"

  - id: task-002
    title: "Update neo4j config get to accept dot-notation keys"
    description: |
      Update neo4j-cli/internal/subcommands/config/get.go to use the resolver from
      task-001 so that both global keys (e.g. "output") and aura-prefixed keys
      (e.g. "aura.default-tenant") are accepted. ValidArgs must be updated to offer
      cfg.Global.ValidConfigKeys plus "aura.<key>" for each key in
      cfg.Aura.ValidConfigKeys, excluding any key already present in
      cfg.Global.ValidConfigKeys to prevent "aura.output" appearing as a completion
      candidate. Update or add table-driven tests in get_test.go.
    status: pending
    dependencies:
      - task-001
    acceptance_criteria:
      - "neo4j config get output returns the global output value"
      - "neo4j config get aura.default-tenant returns the aura default-tenant value"
      - "neo4j config get aura.output returns an error"
      - "ValidArgs includes \"aura.base-url\" but not \"aura.output\""
      - "make test passes"
    completed_at: null

  - id: task-003
    title: "Update neo4j config set to accept dot-notation keys"
    description: |
      Update neo4j-cli/internal/subcommands/config/set.go to use the resolver from
      task-001 so that both global and aura-prefixed keys can be set. Value validation
      for global keys (e.g. output must be one of default/json/table) must still apply.
      Aura key values are persisted to the correct viper namespace (e.g.
      "aura.default-tenant"). ValidArgs must follow the same exclusion rule as task-002.
      Update or add table-driven tests in set_test.go.
    status: pending
    dependencies:
      - task-001
    acceptance_criteria:
      - "neo4j config set output table persists to the global output viper key"
      - "neo4j config set aura.base-url <value> persists to the aura.base-url viper key"
      - "neo4j config set output invalid-value returns a validation error"
      - "neo4j config set aura.output <value> returns an error"
      - "make test passes"
    completed_at: null

  - id: task-004
    title: "Remove neo4j config aura subcommand and move project to neo4j config"
    description: |
      Remove the "aura" subcommand group from neo4j-cli/internal/subcommands/config/config.go
      (covering list, get, set) and mount the project subcommand directly under neo4j config
      instead. Ensure neo4j config list continues to show all keys with dot-notation aura
      prefixes and that "output" appears exactly once (never as "aura.output"). Update
      cmd.Use on the project command if needed. Delete or update tests that exercised the
      old "neo4j config aura" paths; add tests asserting those paths are gone.
    status: pending
    dependencies:
      - task-002
      - task-003
    acceptance_criteria:
      - "neo4j config aura list/get/set no longer exists (cobra returns unknown command)"
      - "neo4j config project list/add/use/remove works at the new path"
      - "neo4j config list shows global and aura keys; output appears once, not as aura.output"
      - "Tests for the old neo4j config aura paths are removed or updated"
      - "make test passes"
    completed_at: null

  - id: task-005
    title: "Update aura config list to include global keys with deduplication"
    description: |
      Update the standalone aura config list command (neo4j-cli/aura/internal/subcommands/config/list.go)
      so that it shows both aura-scoped keys and global keys, all without any prefix. The
      "output" key must appear exactly once as a global key and must not be duplicated as
      an aura-scoped key. ValidArgs for aura config get and set must follow the same
      deduplication rule: include global keys and aura keys, but exclude keys that appear
      in both (listing them only once under their flat name). Update list_test.go.
    status: pending
    dependencies:
      - task-001
    acceptance_criteria:
      - "aura config list output includes \"output\" exactly once"
      - "aura config list output includes aura keys without prefix (e.g. \"default-tenant\")"
      - "aura config list output does not include \"aura.default-tenant\" (no prefix)"
      - "aura config get output and aura config get default-tenant both succeed"
      - "make test passes"
    completed_at: null

  - id: task-006
    title: "Update neo4j credential list: remove positional type arg, update columns"
    description: |
      Rework neo4j-cli/aura/internal/subcommands/credential/list.go to remove the
      "aura-client" sub-subcommand and make the list command a leaf command that iterates
      all credential stores. Set Args: cobra.NoArgs explicitly so that passing a positional
      argument (e.g. "aura-client") produces a Cobra error rather than silently succeeding.
      Change the output columns from [name, client-id] to [name, type, identifier], where
      the column header for identifier renders as IDENTIFIER and the value for aura-client
      credentials is the client-id. Secrets must never appear in output. Update list_test.go.
    status: pending
    dependencies: []
    acceptance_criteria:
      - "neo4j credential list (no args) lists all aura-client credentials"
      - "neo4j credential list aura-client returns a Cobra error (Args: cobra.NoArgs enforced)"
      - "Table output columns are NAME, TYPE, IDENTIFIER"
      - "JSON output contains name, type, and identifier fields; no client-secret or access-token"
      - "make test passes"
    completed_at: null

  - id: task-007
    title: "Update aura credential list output columns to match neo4j credential list"
    description: |
      Update the standalone aura credential list command so its output columns are
      consistent with neo4j credential list: name, type, identifier with the IDENTIFIER
      column header. The type value is "aura-client" for all credentials listed by this
      command. Secrets must not appear in output. Update list_test.go for the aura
      credential package.
    status: pending
    dependencies:
      - task-006
    acceptance_criteria:
      - "aura credential list table output columns are NAME, TYPE, IDENTIFIER"
      - "aura credential list JSON output contains name, type, and identifier fields"
      - "client-secret and access-token are absent from all output formats"
      - "make test passes"
    completed_at: null
