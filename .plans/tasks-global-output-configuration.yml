tasks:
  - id: task-001
    title: "Add GlobalConfig struct and migrate output key in clicfg"
    description: |
      Add a GlobalConfig struct to common/clicfg/clicfg.go backed by the same viper instance as
      AuraConfig. Wire it onto Config as cfg.Global. Implement Output(), BindOutput(), Get(), Set(),
      IsValidConfigKey(), and Print() methods operating on the top-level "output" viper key.
      Change setDefaultValues to use Viper.SetDefault("output", "default") instead of "aura.output".
      Remove "output" from AuraConfig.ValidConfigKeys and remove Output() and BindOutput() from
      AuraConfig. Add a silent one-time migration block in NewConfig: if viper.IsSet("aura.output")
      and !viper.IsSet("output"), move the value to the top-level key via sjson and delete "aura.output".
    status: completed
    dependencies: []
    acceptance_criteria:
      - "cfg.Global is non-nil after NewConfig and cfg.Global.Output() returns \"default\" with an empty config"
      - "cfg.Global.Set(\"output\", \"json\") writes {\"output\":\"json\"} at the JSON root (not under \"aura\")"
      - "A config.json containing {\"aura\":{\"output\":\"json\"}} is silently migrated to {\"output\":\"json\"} on first NewConfig call"
      - "cfg.Aura.Output() and cfg.Aura.BindOutput() no longer exist; callers that reference them fail to compile"
      - "\"output\" is absent from AuraConfig.ValidConfigKeys"
    completed_at: 2026-05-01T00:00:00Z

  - id: task-002
    title: "Extract registerOutputFlag helper and update output.go"
    description: |
      Create a shared helper function registerOutputFlag(cmd *cobra.Command, cfg *clicfg.Config)
      in a new package or alongside the entry-point code. The function registers --output as a
      PersistentFlag on cmd, then sets PersistentPreRunE to validate the flag value against
      ValidOutputValues and call cfg.Global.BindOutput. Also update neo4j-cli/aura/internal/output/output.go
      to call cfg.Global.Output() instead of cfg.Aura.Output() (line 20).
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "registerOutputFlag exists and can be called with any cobra.Command root without error"
      - "Passing an invalid --output value via the registered PersistentPreRunE returns a usage error"
      - "output.go compiles with cfg.Global.Output() and no longer references cfg.Aura.Output()"
      - "PrintBodyMap still routes json/table/default correctly based on cfg.Global.Output()"
    completed_at: 2026-05-01T01:00:00Z

  - id: task-003
    title: "Wire EnableTraverseRunHooks and registerOutputFlag into both binary entry points"
    description: |
      In neo4j-cli/main.go NewCmd(), call registerOutputFlag on the neo4j root command and add
      cmd.AddCommand for the future config package. Set cobra.EnableTraverseRunHooks = true in
      main() before cmd.Execute(). Apply the same changes in neo4j-cli/aura/cmd/main.go: call
      registerOutputFlag on the standalone root returned by aura.NewStandaloneCmd and set
      cobra.EnableTraverseRunHooks = true before cmd.Execute(). This ensures the root-level output
      hook runs for every command in every binary even when child PersistentPreRunE hooks are present.
    status: completed
    dependencies:
      - task-002
    acceptance_criteria:
      - "cobra.EnableTraverseRunHooks = true appears in both main() functions before Execute()"
      - "registerOutputFlag is called on the neo4j root in neo4j-cli/main.go"
      - "registerOutputFlag is called on the standalone aura-cli root in neo4j-cli/aura/cmd/main.go"
      - "make build succeeds for both binaries"
    completed_at: 2026-05-01T02:00:00Z

  - id: task-004
    title: "Strip output logic from 8 resource-group PersistentPreRunE hooks"
    description: |
      In each of the 8 resource-group parent commands, remove the --output PersistentFlag
      registration, the output value validation block, and the cfg.Aura.BindOutput call. Retain
      only the base-url and auth-url binding logic. The files are: instance/instance.go,
      tenant/tenant.go, customermanagedkey/customermanagedkey.go, graphanalytics/graphanalytics.go,
      graphanalytics/session/session.go, import/import.go, dataapi/data_api.go, deployment/deployment.go.
    status: completed
    dependencies:
      - task-003
    acceptance_criteria:
      - "None of the 8 files contains a --output PersistentFlag registration or BindOutput call"
      - "Each file's PersistentPreRunE retains base-url and auth-url binding where applicable"
      - "make build succeeds after removals"
      - "grep -r 'BindOutput\\|Lookup.*output' across the 8 files returns no results"
    completed_at: 2026-05-01T00:00:00Z

