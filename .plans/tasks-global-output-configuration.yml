    description: |
      Restructure the aura config commands to follow the credential pattern: remove config from
      the aura subcommand tree and expose it at the neo4j root under neo4j config aura.

      Steps:
      1. In neo4j-cli/aura/aura.go, remove the config.NewCmd(cfg) line from NewCmd so that
