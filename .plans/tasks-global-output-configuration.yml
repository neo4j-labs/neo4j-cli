  - id: task-015
    title: "Build flat standalone aura-cli config command"
    description: |
      The standalone aura-cli binary needs a flat config command that covers both global keys
      (e.g. output) and aura-scoped keys (auth-url, base-url, default-tenant) in a single
      interface — mirroring how aura-cli credential works (flat at the root, not nested).

      Implementation approach:
      1. Create a NewStandaloneConfigCmd(cfg) function (in the aura config package or a new
         standalone-specific file under neo4j-cli/aura/). This builds a config command whose
         get/set/list subcommands understand all keys from both cfg.Aura.ValidConfigKeys and
         cfg.Global.ValidConfigKeys.
      2. Routing in set/get: if key is in cfg.Global.ValidConfigKeys → call cfg.Global methods;
         if in cfg.Aura.ValidConfigKeys → call cfg.Aura methods; otherwise return error.
      3. list renders all keys from both domains.
      4. In NewStandaloneCmd (aura.go), replace the existing config.NewCmd(cfg) reference with
         NewStandaloneConfigCmd(cfg).

      The change applies ONLY to the standalone path (NewStandaloneCmd). NewCmd (used when
      mounted as neo4j aura) must not include this standalone config command — the neo4j super-CLI
      already has neo4j config and neo4j config aura for this purpose (see task-018).
    status: todo
    dependencies:
      - task-013
      - task-018
    acceptance_criteria:
      - "aura-cli config set output json writes {\"output\":\"json\"} at the JSON root"
      - "aura-cli config get output returns the current global output value"
      - "aura-cli config list includes output alongside auth-url, base-url, default-tenant"
      - "aura-cli config set auth-url <value> writes to aura.auth-url (aura key routing)"
      - "aura-cli config get auth-url returns the current aura auth-url value"
      - "aura-cli config set unknown-key errors with 'invalid config key specified'"
      - "make build succeeds for both binaries"

