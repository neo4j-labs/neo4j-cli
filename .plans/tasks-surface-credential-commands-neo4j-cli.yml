feature: surface-credential-commands-neo4j-cli
prd: ./prd-surface-credential-commands-neo4j-cli.md
created_at: 2026-05-01T00:00:00Z
updated_at: 2026-05-01T00:00:00Z

tasks:
  - id: task-001
    title: "Split aura.NewCmd to remove credential registration; add NewStandaloneCmd"
    description: |
      Modify `neo4j-cli/aura/aura.go` so that `NewCmd` no longer calls `credential.NewCmd(cfg)`.
      Add a new exported `NewStandaloneCmd(cfg *clicfg.Config) *cobra.Command` that calls `NewCmd`
      and then appends the credential subcommand — this preserves `aura-cli credential ...`
      behaviour without exposing it through `neo4j-cli aura credential`.
    status: completed
    completed_at: 2026-05-01T00:00:00Z
    dependencies: []
    acceptance_criteria:
      - "`aura.NewCmd` does not register a `credential` subcommand"
      - "`aura.NewStandaloneCmd` returns a command that includes the `credential` subcommand"
      - "No existing imports or symbols in `aura.go` are broken by the change"
      - "`make build` succeeds after this change alone"

  - id: task-002
    title: "Update aura-cli entrypoint to use NewStandaloneCmd"
    description: |
      Change `neo4j-cli/aura/cmd/main.go` to call `aura.NewStandaloneCmd(cfg)` instead of
      `aura.NewCmd(cfg)`, so the standalone `aura-cli` binary continues to expose
      `credential add/list/remove/use` at its top level without any other behaviour changes.
    status: completed
    completed_at: 2026-05-01T00:00:00Z
    dependencies:
      - task-001
    acceptance_criteria:
      - "`neo4j-cli/aura/cmd/main.go` calls `aura.NewStandaloneCmd(cfg)` not `aura.NewCmd(cfg)`"
      - "`aura-cli credential add/list/remove/use` commands remain fully functional"
      - "`make build` produces a working `bin/aura-cli` binary`"

  - id: task-003
    title: "Create neo4j-cli/aura/credential.go with NewCredentialCmd"
    description: |
      Create `neo4j-cli/aura/credential.go` in the `aura` package (not `internal`). Export
      `NewCredentialCmd(cfg *clicfg.Config) *cobra.Command` which builds a `credential` command
      tree where each action (`add`, `list`, `remove`, `use`) has an `aura-client` subcommand.
      The `aura-client` subcommands delegate directly to `cfg.Credentials.Aura.*` methods,
      mirroring the flag definitions in the internal credential commands. Include the Neo4j
      copyright header.
    status: pending
    dependencies:
      - task-001
    acceptance_criteria:
      - "File starts with the Neo4j copyright header"
      - "`NewCredentialCmd` is exported and returns a `*cobra.Command` with Use `credential`"
      - "`credential add aura-client` accepts `--name`, `--client-id`, `--client-secret` (all required)"
      - "`credential list aura-client` calls `cfg.Credentials.Aura.Print`"
      - "`credential remove aura-client <name>` calls `cfg.Credentials.Aura.Remove`"
      - "`credential use aura-client <name>` calls `cfg.Credentials.Aura.SetDefault`"
      - "No import of any `internal` package from outside `neo4j-cli/aura/`"

  - id: task-004
    title: "Register NewCredentialCmd in neo4j-cli/main.go"
    description: |
      Modify `neo4j-cli/main.go` to add `cmd.AddCommand(aura.NewCredentialCmd(cfg))` after the
      `aura` subcommand is registered. This wires the new `credential` top-level command into
      the `neo4j-cli` binary without touching the `aura` subtree.
    status: pending
    dependencies:
      - task-003
    acceptance_criteria:
      - "`neo4j-cli/main.go` calls `aura.NewCredentialCmd(cfg)` and adds it to the root command"
      - "`neo4j-cli credential` appears as a top-level command in `--help` output"
      - "`neo4j-cli aura credential` is not a registered command"
      - "`make build` produces a working `bin/neo4j-cli` binary"

  - id: task-005
    title: "Write tests for the new neo4j-cli credential command tree"
    description: |
      Create `neo4j-cli/aura/credential_test.go` with table-driven tests covering all four
      `aura-client` subcommands. Since `AuraTestHelper` drives `aura.NewCmd`, add a thin local
      helper in the test file that wires `NewCredentialCmd` with a `clicfg.Config` backed by an
      in-memory filesystem (using `testfs` and `clicfg.NewConfig`), mirroring the pattern in
      `auratesthelper.go`. Tests must cover: add (first credential, duplicate, additional),
      list, remove, and use (set default). Include the Neo4j copyright header.
    status: pending
    dependencies:
      - task-003
      - task-004
    acceptance_criteria:
      - "File starts with the Neo4j copyright header"
      - "`credential add aura-client` test: first credential is stored and set as default"
      - "`credential add aura-client` test: duplicate name returns an error"
      - "`credential list aura-client` test: lists all stored credentials"
      - "`credential remove aura-client <name>` test: named credential is removed"
      - "`credential use aura-client <name>` test: named credential becomes the default"
      - "`make test` passes with all new tests green"

  - id: task-006
    title: "Add changelog entries for aura-cli and neo4j-cli"
    description: |
      Run `changie new` to create changelog entries for both the `aura-cli` and `neo4j-cli`
      projects describing the new `neo4j-cli credential` top-level commands. Use the
      multi-project flag so a single call creates entries for both projects.
    status: pending
    dependencies:
      - task-005
    acceptance_criteria:
      - "A changelog entry exists for the `aura-cli` project describing the change"
      - "A changelog entry exists for the `neo4j-cli` project describing the change"
      - "`make changelog` (or `changie new`) completes without error"
      - "Entry kind is appropriate (e.g. `added` or `feat`)"
