changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## {{.Version}} - {{.Time.Format "2006-01-02"}}'
kindFormat: "### {{.Kind}}"
changeFormat: "* {{.Body}}"
kinds:
    - label: Major
      auto: major
    - label: Minor
      auto: minor
    - label: Patch
      auto: patch
newlines:
    afterChangelogHeader: 1
    beforeChangelogVersion: 1
    endOfVersion: 1
envPrefix: CHANGIE_
projects:
    - label: aura-cli
      key: aura-cli
      changelog: CHANGELOG-aura.md
    - label: neo4j-cli
      key: neo4j-cli
      changelog: CHANGELOG-neo4j.md
